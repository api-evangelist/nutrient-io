aid: nutrient-io
name: Nutrient.io
description: >-
  Nutrient (formerly PSPDFKit) provides a powerful and secure document processing
  platform via Document Web Services (DWS). Fast and easy integration enables
  instant generation, conversion, modification, and digital signing of PDF
  documents, plus accessibility tagging and AI-powered document workflows.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Documents
  - PDF
  - Document Processing
  - eSignature
  - Accessibility
  - OCR
created: '2025-02-08'
modified: '2026-04-28'
url: https://raw.githubusercontent.com/api-evangelist/nutrient-io/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: nutrient-io:viewer-api
    name: Nutrient Viewer API
    description: >-
      Deliver rich document interactions directly in the browser including PDF
      rendering, annotation, form filling, and signature collection.
    humanURL: https://www.nutrient.io/api/viewer-api/
    tags:
      - Viewer
      - Annotations
      - Forms
      - Signatures
    properties:
      - type: Documentation
        url: https://www.nutrient.io/api/viewer-api/
      - type: Reference
        url: https://www.nutrient.io/api/reference/public/
      - type: GettingStarted
        url: https://www.nutrient.io/guides/dws-viewer-api/
  - aid: nutrient-io:processor-api
    name: Nutrient Processor API
    description: >-
      Headless cloud document workflow API for generation, conversion,
      extraction, OCR, and automation across PDFs and Office documents.
    humanURL: https://www.nutrient.io/api/processor-api/
    tags:
      - Processing
      - Conversion
      - OCR
      - Extraction
    properties:
      - type: Documentation
        url: https://www.nutrient.io/api/processor-api/
      - type: Reference
        url: https://www.nutrient.io/api/reference/public/
      - type: GettingStarted
        url: https://www.nutrient.io/guides/dws-processor/getting-started/
  - aid: nutrient-io:accessibility-api
    name: Nutrient Accessibility API
    description: >-
      Automate PDF accessibility through cloud-based auto-tagging and validation
      to support compliance with WCAG and PDF/UA standards.
    humanURL: https://www.nutrient.io/api/accessibility-api/
    tags:
      - Accessibility
      - PDF/UA
      - WCAG
      - Tagging
    properties:
      - type: Documentation
        url: https://www.nutrient.io/api/accessibility-api/
      - type: Reference
        url: https://www.nutrient.io/api/reference/public/
  - aid: nutrient-io:ai-api
    name: Nutrient AI API
    description: >-
      AI-powered document workflows including extraction, classification, and
      analysis built on top of the Nutrient document platform.
    humanURL: https://www.nutrient.io/api/ai/
    tags:
      - AI
      - Extraction
      - Classification
    properties:
      - type: Documentation
        url: https://www.nutrient.io/api/ai/
